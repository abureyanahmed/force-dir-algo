<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FR Graph – Subtree Layout</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:10px;
}

textarea{
width:100%;
height:140px;
font-family:monospace;
margin-bottom:8px;
}

button,input{
margin-right:5px;
margin-bottom:5px;
}

canvas{
background:white;
border:1px solid #ccc;
cursor:crosshair;
}
</style>
</head>

<body>

<div>

<strong>Polygon region</strong><br>
<button id="finishPolygon">Finish region</button>
<button id="clearPolygon">Clear region</button>

<br><br>

<strong>Subtree selection</strong><br>
<button id="selectNodeBtn">Select node</button>
<button id="selectEdgesBtn">Select edges</button>
<button id="clearSelection">Clear selection</button>

<br><br>

<strong>Graph input</strong><br>

<textarea id="graphInput">
A 200 200
B 300 250
C 350 200
D 400 260
E 300 350
F 450 200
A B
B C
C D
B E
C F
</textarea>

<button id="loadGraph">Load graph</button>

<br><br>

Period:
<input type="number" id="periodInput" value="16">

Cooling:
<input type="number" id="coolingInput" value="0.95" step="0.01">

<br><br>

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

</div>

<canvas id="graph" width="800" height="600"></canvas>

<script>

const canvas=document.getElementById("graph");
const ctx=canvas.getContext("2d");

let nodes=[];
let links=[];
let nodeIndex=new Map();

let polygon=[];
let polygonClosed=false;

let intervalId=null;
let period=16;
let cooling=0.95;
let temperature=80;
let k=50;

let rootNode=null;
let selectingNode=false;
let selectingEdges=false;

let selectedEdges=new Set();
let subtreeEdges=new Set();
let movableNodes=new Set();


//------------------------------------------------
// Geometry helpers
//------------------------------------------------

function distPointSegment(px,py,x1,y1,x2,y2){

const A=px-x1;
const B=py-y1;
const C=x2-x1;
const D=y2-y1;

const dot=A*C+B*D;
const len=C*C+D*D;

let t=Math.max(0,Math.min(1,dot/len));

const x=x1+t*C;
const y=y1+t*D;

return Math.hypot(px-x,py-y);
}

function segmentsIntersect(a,b,c,d){

function orient(p,q,r){
return(q.x-p.x)*(r.y-p.y)-(q.y-p.y)*(r.x-p.x);
}

const o1=orient(a,b,c);
const o2=orient(a,b,d);
const o3=orient(c,d,a);
const o4=orient(c,d,b);

return o1*o2<0 && o3*o4<0;
}

function edgesShareNode(e1,e2){
return(
e1.source===e2.source||
e1.source===e2.target||
e1.target===e2.source||
e1.target===e2.target
);
}


//------------------------------------------------
// Planarity
//------------------------------------------------

function introducesCrossing(nodeIndexMoved){

const incident=links.filter(
e=>e.source===nodeIndexMoved||e.target===nodeIndexMoved
);

for(const e1 of incident){

const a=nodes[e1.source];
const b=nodes[e1.target];

for(const e2 of links){

if(e1===e2||edgesShareNode(e1,e2))continue;

const c=nodes[e2.source];
const d=nodes[e2.target];

if(segmentsIntersect(a,b,c,d))return true;

}
}

return false;
}

function moveCrossesPolygon(oldPos,newPos){

if(!polygonClosed)return false;

for(let i=0;i<polygon.length;i++){

const p1=polygon[i];
const p2=polygon[(i+1)%polygon.length];

if(segmentsIntersect(oldPos,newPos,p1,p2))return true;

}

return false;
}


//------------------------------------------------
// Force model
//------------------------------------------------

function repulsiveForce(d){return(k*k)/d;}
function attractiveForce(d){return(d*d)/k;}


//------------------------------------------------
// Subtree computation
//------------------------------------------------

function computeSubtrees(){

movableNodes.clear();
subtreeEdges.clear();

if(rootNode===null)return;

const adj={};

for(let i=0;i<nodes.length;i++)adj[i]=[];

for(let i=0;i<links.length;i++){

const e=links[i];

adj[e.source].push({node:e.target,edge:i});
adj[e.target].push({node:e.source,edge:i});

}

for(const edgeIndex of selectedEdges){

const e=links[edgeIndex];

let start=(e.source===rootNode)?e.target:e.source;

let stack=[start];
let visited=new Set([rootNode]);

subtreeEdges.add(edgeIndex);

while(stack.length){

let v=stack.pop();

if(visited.has(v))continue;

visited.add(v);
movableNodes.add(v);

for(const item of adj[v]){

if(!visited.has(item.node)){

stack.push(item.node);
subtreeEdges.add(item.edge);

}

}

}

}

}


//------------------------------------------------
// Simulation
//------------------------------------------------

function step(){

for(let i=0;i<nodes.length;i++){

if(i===rootNode)continue;
if(!movableNodes.has(i))continue;

const v=nodes[i];
const old={x:v.x,y:v.y};

let fx=0,fy=0;

for(let j=0;j<nodes.length;j++){

if(i===j)continue;

const u=nodes[j];

let dx=v.x-u.x;
let dy=v.y-u.y;

let d=Math.hypot(dx,dy)||0.01;

const f=repulsiveForce(d);

fx+=(dx/d)*f;
fy+=(dy/d)*f;

}

for(const e of links){

let u=null;

if(e.source===i)u=nodes[e.target];
else if(e.target===i)u=nodes[e.source];
else continue;

let dx=v.x-u.x;
let dy=v.y-u.y;

let d=Math.hypot(dx,dy)||0.01;

const f=attractiveForce(d);

fx-=(dx/d)*f;
fy-=(dy/d)*f;

}

const disp=Math.hypot(fx,fy)||0.01;

v.x+=(fx/disp)*Math.min(disp,temperature);
v.y+=(fy/disp)*Math.min(disp,temperature);

if(moveCrossesPolygon(old,v)){
v.x=old.x;
v.y=old.y;
continue;
}

if(introducesCrossing(i)){
v.x=old.x;
v.y=old.y;
continue;
}

}

temperature*=cooling;

}


//------------------------------------------------
// Drawing
//------------------------------------------------

function drawPolygon(){

if(polygon.length===0)return;

ctx.strokeStyle="#444";
ctx.fillStyle="rgba(200,200,200,0.15)";

ctx.beginPath();
ctx.moveTo(polygon[0].x,polygon[0].y);

for(let i=1;i<polygon.length;i++)
ctx.lineTo(polygon[i].x,polygon[i].y);

if(polygonClosed){
ctx.closePath();
ctx.fill();
}

ctx.stroke();

ctx.fillStyle="black";

for(const p of polygon){

ctx.beginPath();
ctx.arc(p.x,p.y,5,0,Math.PI*2);
ctx.fill();

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawPolygon();

ctx.lineWidth=2;

for(let i=0;i<links.length;i++){

const e=links[i];
const s=nodes[e.source];
const t=nodes[e.target];

if(selectedEdges.has(i))ctx.strokeStyle="orange";
else if(subtreeEdges.has(i))ctx.strokeStyle="green";
else ctx.strokeStyle="#aaa";

ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(t.x,t.y);
ctx.stroke();

}

for(let i=0;i<nodes.length;i++){

const v=nodes[i];

ctx.beginPath();

ctx.fillStyle=(i===rootNode)?"red":"#4682b4";

ctx.arc(v.x,v.y,6,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.fillText(v.id,v.x+6,v.y-6);

}

}


//------------------------------------------------
// Parsing
//------------------------------------------------

function loadGraphFromText(text){

nodes=[];
links=[];
nodeIndex.clear();

const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);

let idx=0;

for(const line of lines){

const p=line.split(/\s+/);

if(p.length===3){

const[id,x,y]=p;

nodes.push({id,x:+x,y:+y});
nodeIndex.set(id,idx++);

}

}

for(const line of lines){

const p=line.split(/\s+/);

if(p.length===2){

const[a,b]=p;

if(nodeIndex.has(a)&&nodeIndex.has(b)){

links.push({
source:nodeIndex.get(a),
target:nodeIndex.get(b)
});

}

}

}

k=Math.sqrt((canvas.width*canvas.height)/Math.max(1,nodes.length));

temperature=canvas.width/10;

draw();

}


//------------------------------------------------
// Mouse interaction
//------------------------------------------------

canvas.addEventListener("click",e=>{

const rect=canvas.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;


// select node
if(selectingNode){

for(let i=0;i<nodes.length;i++){

const n=nodes[i];

if(Math.hypot(n.x-x,n.y-y)<10){

rootNode=i;
computeSubtrees();
draw();
return;

}

}

}


// select edges
if(selectingEdges && rootNode!==null){

for(let i=0;i<links.length;i++){

const e=links[i];

if(e.source!==rootNode && e.target!==rootNode)continue;

const s=nodes[e.source];
const t=nodes[e.target];

const d=distPointSegment(x,y,s.x,s.y,t.x,t.y);

if(d<8){

selectedEdges.add(i);

computeSubtrees();
draw();
return;

}

}

}


// polygon creation
if(!polygonClosed){

polygon.push({x,y});
draw();

}

});


//------------------------------------------------
// UI
//------------------------------------------------

finishPolygon.onclick=()=>{
if(polygon.length>=3)polygonClosed=true;
draw();
};

clearPolygon.onclick=()=>{
polygon=[];
polygonClosed=false;
draw();
};

selectNodeBtn.onclick=()=>{
selectingNode=true;
selectingEdges=false;
};

selectEdgesBtn.onclick=()=>{
selectingEdges=true;
selectingNode=false;
};

clearSelection.onclick=()=>{
rootNode=null;
selectedEdges.clear();
subtreeEdges.clear();
movableNodes.clear();
draw();
};

loadGraph.onclick=()=>loadGraphFromText(graphInput.value);

periodInput.onchange=e=>{
period=Math.max(1,+e.target.value);
if(intervalId)start();
};

coolingInput.onchange=e=>{
cooling=Math.min(1,Math.max(0,+e.target.value));
};

function start(){

stop();

intervalId=setInterval(()=>{
step();
draw();
},period);

}

function stop(){

if(intervalId){
clearInterval(intervalId);
intervalId=null;
}

}

startBtn.onclick=start;
stopBtn.onclick=stop;

draw();

</script>

</body>
</html>
