function drawBoundary(ctx, points, transform) {
  ctx.fillStyle = "#4682b4";

  for (const v of points) {
    const p = transformPoint(v.x, v.y, transform);

    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  if (points.length < 2) return;
  
  ctx.strokeStyle = "#aaa";
  ctx.beginPath();

  // move to first point
  const first = transformPoint(points[0].x, points[0].y, transform);
  ctx.moveTo(first.x, first.y);

  // connect each point to the next
  for (let i = 1; i < points.length; i++) {
    const p = transformPoint(points[i].x, points[i].y, transform);
    ctx.lineTo(p.x, p.y);
  }

  // close the region
  ctx.lineTo(first.x, first.y);

  ctx.stroke();

  // optional: fill the region
  ctx.fillStyle = "rgba(70, 130, 180, 0.15)";
  ctx.fill();
}

function isPointInPolygon(polygon, point) {
  const { x, y } = point;
  let inside = false;

  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].x;
    const yi = polygon[i].y;
    const xj = polygon[j].x;
    const yj = polygon[j].y;

    const intersects =
      ((yi > y) !== (yj > y)) &&
      (x < ((xj - xi) * (y - yi)) / (yj - yi) + xi);

    if (intersects) {
      inside = !inside;
    }
  }

  return inside;
}

// ----------------- Graph creation -----------------

function createNodes(n) {
  nodes = [];
  for (let i = 0; i < n; i++) {
    nodes.push({
      id: i,
      x: Math.random() * width,
      y: Math.random() * height
    });
  }
  k = Math.sqrt(area / nodes.length);
  temperature = width / 10;
}

function init_k_temp(n) {
  k = Math.sqrt(area / Object.keys(nodes).length);
  temperature = width / 10;
}

function createLinks(type) {
  links = [];

  const match = type.match(/(path|cycle)(\d+)/);
  if (!match) return;

  const kind = match[1];
  const n = parseInt(match[2]);

  if (kind === "path") {
    for (let i = 0; i < n - 1; i++) {
      links.push({ source: i, target: i + 1 });
    }
  }

  if (kind === "cycle") {
    for (let i = 0; i < n; i++) {
      links.push({
        source: i,
        target: (i + 1) % n
      });
    }
  }
}

// ----------------- FR forces -----------------

//const repulsiveStrength = 1.0;
repulsiveStrength = 0.1;
function repulsiveForce(d) {
  //console.log("repulsiveForce", k, d)
  return repulsiveStrength * (k * k) / d;
}

attractiveStrength = 10;
function attractiveForce(d) {
  return attractiveStrength * (d * d) / k;
}

//const centerStrength = 0.01;
const centerStrength = 0.1;
function centerForce(distanceToCenter) {
  return centerStrength * distanceToCenter;
}

function computeCenter(nodes) {
    let minX = Infinity;
    let minY = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;

    for (const node of Object.values(nodes)) {
        minX = Math.min(minX, node.x);
        minY = Math.min(minY, node.y);
        maxX = Math.max(maxX, node.x);
        maxY = Math.max(maxY, node.y);
    }

    return {
        cx: (minX + maxX) / 2,
        cy: (minY + maxY) / 2,
    };
}

// ----------------- Sequential step -----------------

function getLineSegments(points) {
  if (points.length < 2) return [];

  return points.map((point, i) => ({
    start: point,
    end: points[(i + 1) % points.length],
  }));
}

function getEdgeSegments(nodes, links){
  if (links.length < 1) return [];

  return links.map((link) => ({
    start: {x:nodes[link.source].x, y:nodes[link.source].y},
    end: {x:nodes[link.target].x, y:nodes[link.target].y},
  }));
}

const EPS = 1e-9;

function cross(a, b, c) {
  return (b.x - a.x) * (c.y - a.y) -
         (b.y - a.y) * (c.x - a.x);
}

function sign(v) {
  if (Math.abs(v) < EPS) return 0;
  return v > 0 ? 1 : -1;
}

function onSegment(a, p, b) {
  return (
    p.x >= Math.min(a.x, b.x) - EPS &&
    p.x <= Math.max(a.x, b.x) + EPS &&
    p.y >= Math.min(a.y, b.y) - EPS &&
    p.y <= Math.max(a.y, b.y) + EPS
  );
}

function lineSegmentsIntersect(a1, a2, b1, b2) {
  const d1 = sign(cross(a1, a2, b1));
  const d2 = sign(cross(a1, a2, b2));
  const d3 = sign(cross(b1, b2, a1));
  const d4 = sign(cross(b1, b2, a2));

  if (d1 * d2 < 0 && d3 * d4 < 0) return true;

  if (d1 === 0 && onSegment(a1, b1, a2)) return true;
  if (d2 === 0 && onSegment(a1, b2, a2)) return true;
  if (d3 === 0 && onSegment(b1, a1, b2)) return true;
  if (d4 === 0 && onSegment(b1, a2, b2)) return true;

  return false;
}

function findIntersectingSegment(segments, line) {
  return segments.find(segment =>
    lineSegmentsIntersect(
      segment.start,
      segment.end,
      line.start,
      line.end
    )
  );
}

function shareEndPoints(l1, l2){
  if((l1.start.x==l2.start.x)&&(l1.start.y==l2.start.y))
    return true
  if((l1.start.x==l2.end.x)&&(l1.start.y==l2.end.y))
    return true
  if((l1.end.x==l2.start.x)&&(l1.end.y==l2.start.y))
    return true
  if((l1.end.x==l2.end.x)&&(l1.end.y==l2.end.y))
    return true
  return false
}

function edgesIntersect(segments){
  for(let i=0;i<segments.length;i++){
    for(let j=i+1;j<segments.length;j++){
      let l1 = segments[i]
      let l2 = segments[j]
      if (!shareEndPoints(l1, l2)){
        let intersects = lineSegmentsIntersect(
          l1.start,
          l1.end,
          l2.start,
          l2.end
        )
        if(intersects)return true
      }
    }
  }
  return false
}

function findIntersectingPoint(s1, s2) {
  const EPS = 1e-9;

  const p = s1.start;
  const r = {
    x: s1.end.x - s1.start.x,
    y: s1.end.y - s1.start.y,
  };

  const q = s2.start;
  const s = {
    x: s2.end.x - s2.start.x,
    y: s2.end.y - s2.start.y,
  };

  const cross = (a, b) => a.x * b.y - a.y * b.x;

  const rxs = cross(r, s);
  const qmp = {
    x: q.x - p.x,
    y: q.y - p.y,
  };

  if (Math.abs(rxs) < EPS) {
    return null; // parallel or collinear
  }

  const t = cross(qmp, s) / rxs;
  const u = cross(qmp, r) / rxs;

  if (
    t < -EPS || t > 1 + EPS ||
    u < -EPS || u > 1 + EPS
  ) {
    return null;
  }

  const tc =
    Math.abs(t) < EPS ? 0 :
    Math.abs(t - 1) < EPS ? 1 :
    t;

  return {
    x: p.x + tc * r.x,
    y: p.y + tc * r.y,
  };
}

function getPointAlongLine(start, end, percent = 0.95){
  let x = start.x + percent * (end.x - start.x)
  let y = start.y + percent * (end.y - start.y)
  //console.log("start end percent", start, end, percent, start.x + percent*(end.x - start.x), start.y, percent*(end.y - start.y))

  return {x, y}
  
}

function crossings_from_nodes(non_isolated_nodes, links){
  // find new point, update if no crossing
  let edgeSegments = getEdgeSegments(non_isolated_nodes, links)
  return edgesIntersect(edgeSegments)
}

function update_vertex_pos(v, v_new){
  v.x = v_new.x
  v.y = v_new.y

  if(crossings_from_nodes(non_isolated_nodes, links))
    console.log("Edges intersect")
  else
    console.log("No edges intersect")
}

function move_point_safe(fx, fy, v, temperature, boundaryPoints){
  // find new point, update if not going outside
  const disp = Math.hypot(fx, fy) || 0.01;
  //console.log("fx, fy, disp", fx, fy, disp)
  let x_new = v.x + (fx / disp) * Math.min(disp, temperature);
  let y_new = v.y + (fy / disp) * Math.min(disp, temperature);
  //console.log("new", x_new, y_new)

  let v_new = {x:x_new, y:y_new}

  let inside_org = isPointInPolygon(boundaryPoints, v)
  if(inside_org)
    console.log(v.label, 'was inside the boundary')
  else
    console.log(v.label, 'was outside of the boundary')

  let inside = isPointInPolygon(boundaryPoints, v_new)
  if(inside)
    console.log(v.label, 'remained inside the boundary')
  else
    console.log(v.label, 'went outside of the boundary')

  if(inside){
    //console.log("updating", v)
    //v.x = x_new
    //v.y = y_new
    update_vertex_pos(v, v_new)
  }
  else{
    let line_segments = getLineSegments(boundaryPoints)
    let movement_segment = {start:v, end:v_new}
    //console.log("line_segments", line_segments)
    //console.log("movement_segment", movement_segment)
    let intersecting_segment = findIntersectingSegment(line_segments, movement_segment)
    //console.log(intersecting_segment)
    let intersectingPoint = findIntersectingPoint(intersecting_segment, movement_segment)
    //if(intersecting_segment!=null)
    //  console.log(intersectingPoint)
    v_new = getPointAlongLine(v, intersectingPoint)
    //console.log("v_new", v_new)
    //v.x = v_new.x
    //v.y = v_new.y
    update_vertex_pos(v, v_new)
  }
}

function step() {
  //for (let i = 0; i < nodes.length; i++) {
  //for (let i in nodes) {
  for (let i in non_isolated_nodes) {
    //const v = nodes[i];
    const v = non_isolated_nodes[i];

    let fx = 0;
    let fy = 0;

    // Repulsion
    //for (let j = 0; j < nodes.length; j++) {
    //for (let j in nodes) {
    for (let j in non_isolated_nodes) {
      if (i === j) continue;

      //const u = nodes[j];
      const u = non_isolated_nodes[j];
      let dx = v.x - u.x;
      let dy = v.y - u.y;
      let dist = Math.hypot(dx, dy) || 0.01;

      const f = repulsiveForce(dist);
      dx /= dist;
      dy /= dist;

      let cur_fx = dx * f
      let cur_fy = dy * f

      //move_point_safe(cur_fx, cur_fy, v, temperature, boundaryPoints)

      //console.log("repulsion", dist, f, dx, dy, cur_fx, cur_fy)

      fx += cur_fx;
      fy += cur_fy;
    }

    // Attraction
    for (const e of links) {
      let u = null;

      if (e.source == i) u = nodes[e.target];
      else if (e.target == i) u = nodes[e.source];
      else continue;

      let dx = v.x - u.x;
      let dy = v.y - u.y;
      let dist = Math.hypot(dx, dy) || 0.01;

      const f = attractiveForce(dist);
      dx /= dist;
      dy /= dist;

      let cur_fx = dx * f
      let cur_fy = dy * f

      //move_point_safe(cur_fx, cur_fy, v, temperature, boundaryPoints)
      //console.log("attraction", dist, cur_fx, cur_fy)

      fx -= cur_fx;
      fy -= cur_fy;
    }

    // center force
    //let { cx, cy } = computeCenter(nodes);
    let { cx, cy } = computeCenter(non_isolated_nodes);
    let dx = cx - v.x;
    let dy = cy - v.y;
    let dist = Math.hypot(dx, dy) || 0.01;

    let f = centerForce(dist);

    let cur_fx = (dx / dist) * f
    let cur_fy = (dy / dist) * f

    //move_point_safe(cur_fx, cur_fy, v, temperature, boundaryPoints)

    //console.log("f, c, cur, dist", f, cx, cy, cur_fx, cur_fy, dist)

    fx += cur_fx;
    fy += cur_fy;

    // find new point, update if not going outside
    /*const disp = Math.hypot(fx, fy) || 0.01;
    let x_new = v.x + (fx / disp) * Math.min(disp, temperature);
    let y_new = v.y + (fy / disp) * Math.min(disp, temperature);
    if(isPointInPolygon(boundaryPoints, {x:x_new, y:y_new})){
      v.x = x_new
      v.y = y_new
    }*/

    move_point_safe(fx, fy, v, temperature, boundaryPoints)

    // Move immediately
    //const disp = Math.hypot(fx, fy) || 0.01;
    //v.x += (fx / disp) * Math.min(disp, temperature);
    //v.y += (fy / disp) * Math.min(disp, temperature);

    /*let inside = isPointInPolygon(boundaryPoints, v)
    if(inside)
      console.log(v.label, 'remained inside the boundary')
    else
      console.log(v.label, 'went outside of the boundary')*/

    if(borderBounded){
      v.x = Math.min(width, Math.max(0, v.x));
      v.y = Math.min(height, Math.max(0, v.y));
    }
  }

  temperature *= cooling;
}

// ----------------- Bounding box ------------

function getCenterBoundary(points){
    let minX = Infinity;
    let minY = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;

    for (const node of points) {
        minX = Math.min(minX, node.x);
        minY = Math.min(minY, node.y);
        maxX = Math.max(maxX, node.x);
        maxY = Math.max(maxY, node.y);
    }

    return [(minX + maxX)/2, (minY +maxY)/2]
}

// ----------------- Drawing -----------------

function computeTransform(nodes, width, height, padding = 20) {
    let minX = Infinity;
    let minY = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;

    for (const node of Object.values(nodes)) {
        minX = Math.min(minX, node.x);
        minY = Math.min(minY, node.y);
        maxX = Math.max(maxX, node.x);
        maxY = Math.max(maxY, node.y);
    }

    console.log("Boundary box: (min)", minX, minY, "(max)", maxX, maxY)

    const graphWidth = Math.max(maxX - minX, 1);
    const graphHeight = Math.max(maxY - minY, 1);

    const scale = Math.min(
        (width - 2 * padding) / graphWidth,
        (height - 2 * padding) / graphHeight
    );

    // Center the graph
    const tx =
        (width - graphWidth * scale) / 2 - minX * scale;

    const ty =
        (height - graphHeight * scale) / 2 - minY * scale;

    return { scale, tx, ty };
}

function transformPoint(x, y, transform) {
    return {
        x: x * transform.scale + transform.tx,
        y: y * transform.scale + transform.ty,
    };
}

// ----------------- Animation control -----------------

function startAnimation() {
  stopAnimation();
  intervalId = setInterval(() => {
    step();
    draw();
  }, period);
}

function stopAnimation() {
  if (intervalId !== null) {
    clearInterval(intervalId);
    intervalId = null;
  }
}
