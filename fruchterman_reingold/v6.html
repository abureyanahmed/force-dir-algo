    const fid = "0"

    const nodesFile = "../nodes_"+fid+".js";

    script.src = nodesFile;

    const linksFile = "../links_"+fid+".js"; 
    const script2 = document.createElement("script");
    script2.src = linksFile;
    document.head.appendChild(script2);
  </script>
  <title>FR Graph – Sequential Update</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 10px;
    }
    #controls {
      margin-bottom: 10px;
    }
    canvas {
      background: white;
      border: 1px solid #ccc;
      display: block;
    }
    label {
      margin-right: 10px;
    }
  </style>
</head>
<body>

<div id="controls">
  <label>
    Graph:
    <select id="graphType">
      <optgroup label="Paths">
        <option value="path3">path3</option>
        <option value="path5">path5</option>
        <option value="path10">path10</option>
        <option value="path20">path20</option>
      </optgroup>
      <optgroup label="Cycles">
        <option value="cycle3">cycle3</option>
        <option value="cycle5">cycle5</option>
        <option value="cycle10">cycle10</option>
        <option value="cycle20">cycle20</option>
      </optgroup>
    </select>
  </label>

  <label>
    Period (ms):
    <input type="number" id="periodInput" value="16" min="1" step="1">
  </label>

  <button id="runBtn">Run</button>
  <button id="startBtn">Start</button>
  <button id="stopBtn">Stop</button>
</div>

<canvas id="graph" width="800" height="600"></canvas>

<div id="bounded_region">
  <label for="boundary_x">x:</label>
  <input type="text" id="boundary_x">
  <label for="boundary_y">y:</label>
  <input type="text" id="boundary_y">
  <input type="button" value="next" id="nextBtn">
</div>

<script>
const width = 800;
const height = 600;
const area = width * height;

const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");

//let nodes = [];
//let links = [];

let k;
let temperature;
const cooling = 0.95;

let intervalId = null;
let period = 16;

const borderBounded = false;

// ----------------- Boundary -----------------

const boundaryPoints = [];

document.getElementById("nextBtn").addEventListener("click", () => {
  const x = parseFloat(document.getElementById("boundary_x").value);
  const y = parseFloat(document.getElementById("boundary_y").value);

  // Optional: basic validation
  if (Number.isNaN(x) || Number.isNaN(y)) {
    alert("Please enter valid numbers for x and y");
    return;
  }

  boundaryPoints.push({ x, y });

  console.log("Current points:", boundaryPoints);

  // Optional: clear inputs after adding
  document.getElementById("boundary_x").value = "";
  document.getElementById("boundary_y").value = "";
});

function drawBoundary(ctx, points, transform) {
  ctx.fillStyle = "#4682b4";

  for (const v of points) {
    const p = transformPoint(v.x, v.y, transform);

    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  if (points.length < 2) return;
  
  ctx.strokeStyle = "#aaa";
  ctx.beginPath();

  // move to first point
  const first = transformPoint(points[0].x, points[0].y, transform);
  ctx.moveTo(first.x, first.y);

  // connect each point to the next
  for (let i = 1; i < points.length; i++) {
    const p = transformPoint(points[i].x, points[i].y, transform);
    ctx.lineTo(p.x, p.y);
  }

  // close the region (last → first)
  ctx.lineTo(first.x, first.y);

  ctx.stroke();

  // optional: fill the region
  ctx.fillStyle = "rgba(70, 130, 180, 0.15)";
  ctx.fill();
}

// ----------------- Graph creation -----------------

function createNodes(n) {
  nodes = [];
  for (let i = 0; i < n; i++) {
    nodes.push({
      id: i,
      x: Math.random() * width,
      y: Math.random() * height
    });
  }
  k = Math.sqrt(area / nodes.length);
  temperature = width / 10;
}

function init_k_temp(n) {
  k = Math.sqrt(area / nodes.length);
  temperature = width / 10;
}

function createLinks(type) {
  links = [];

  const match = type.match(/(path|cycle)(\d+)/);
  if (!match) return;

  const kind = match[1];
  const n = parseInt(match[2]);

  if (kind === "path") {
    for (let i = 0; i < n - 1; i++) {
      links.push({ source: i, target: i + 1 });
    }
  }

  if (kind === "cycle") {
    for (let i = 0; i < n; i++) {
      links.push({
        source: i,
        target: (i + 1) % n
      });
    }
  }
}

// ----------------- FR forces -----------------

//const repulsiveStrength = 1.0;
const repulsiveStrength = 0.1;
function repulsiveForce(d) {
  return repulsiveStrength * (k * k) / d;
}

function attractiveForce(d) {
  return (d * d) / k;
}

//const centerStrength = 0.01;
const centerStrength = 0.1;
function centerForce(distanceToCenter) {
  return centerStrength * distanceToCenter;
}

function computeCenter(nodes) {
    let minX = Infinity;
    let minY = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;

    for (const node of Object.values(nodes)) {
        minX = Math.min(minX, node.x);
        minY = Math.min(minY, node.y);
        maxX = Math.max(maxX, node.x);
        maxY = Math.max(maxY, node.y);
    }

    return {
        cx: (minX + maxX) / 2,
        cy: (minY + maxY) / 2,
    };
}

// ----------------- Sequential step -----------------

function step() {
  for (let i = 0; i < nodes.length; i++) {
    const v = nodes[i];

    let fx = 0;
    let fy = 0;

    // Repulsion
    for (let j = 0; j < nodes.length; j++) {
      if (i === j) continue;

      const u = nodes[j];
      let dx = v.x - u.x;
      let dy = v.y - u.y;
      let dist = Math.hypot(dx, dy) || 0.01;

      const f = repulsiveForce(dist);
      dx /= dist;
      dy /= dist;

      fx += dx * f;
      fy += dy * f;
    }

    // Attraction
    for (const e of links) {
      let u = null;

      if (e.source === i) u = nodes[e.target];
      else if (e.target === i) u = nodes[e.source];
      else continue;

      let dx = v.x - u.x;
      let dy = v.y - u.y;
      let dist = Math.hypot(dx, dy) || 0.01;

      const f = attractiveForce(dist);
      dx /= dist;
      dy /= dist;

      fx -= dx * f;
      fy -= dy * f;
    }

    // center force
    let { cx, cy } = computeCenter(nodes);
    let dx = cx - v.x;
    let dy = cy - v.y;
    let dist = Math.hypot(dx, dy) || 0.01;

    let f = centerForce(dist);

    fx += (dx / dist) * f;
    fy += (dy / dist) * f;

    // Move immediately
    const disp = Math.hypot(fx, fy) || 0.01;
    v.x += (fx / disp) * Math.min(disp, temperature);
    v.y += (fy / disp) * Math.min(disp, temperature);

    if(borderBounded){
      v.x = Math.min(width, Math.max(0, v.x));
      v.y = Math.min(height, Math.max(0, v.y));
    }
  }

  temperature *= cooling;
}

// ----------------- Drawing -----------------

function computeTransform(nodes, width, height, padding = 20) {
    let minX = Infinity;
    let minY = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;

    for (const node of Object.values(nodes)) {
        minX = Math.min(minX, node.x);
        minY = Math.min(minY, node.y);
        maxX = Math.max(maxX, node.x);
        maxY = Math.max(maxY, node.y);
    }

    console.log("Boundary box: (min)", minX, minY, "(max)", maxX, maxY)

    const graphWidth = Math.max(maxX - minX, 1);
    const graphHeight = Math.max(maxY - minY, 1);

    const scale = Math.min(
        (width - 2 * padding) / graphWidth,
        (height - 2 * padding) / graphHeight
    );

    // Center the graph
    const tx =
        (width - graphWidth * scale) / 2 - minX * scale;

    const ty =
        (height - graphHeight * scale) / 2 - minY * scale;

    return { scale, tx, ty };
}

function transformPoint(x, y, transform) {
    return {
        x: x * transform.scale + transform.tx,
        y: y * transform.scale + transform.ty,
    };
}

function draw() {
  ctx.clearRect(0, 0, width, height);

  /*ctx.strokeStyle = "#aaa";
  ctx.beginPath();
  for (const e of links) {
    const s = nodes[e.source];
    const t = nodes[e.target];
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);
  }
  ctx.stroke();

  ctx.fillStyle = "#4682b4";
  for (const v of nodes) {
    ctx.beginPath();
    ctx.arc(v.x, v.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }*/

  const tr = computeTransform(nodes, canvas.width, canvas.height, 40);

  ctx.strokeStyle = "#aaa";
  ctx.beginPath();

  for (const e of links) {
      const s = nodes[e.source];
      const t = nodes[e.target];

      const ps = transformPoint(s.x, s.y, tr);
      const pt = transformPoint(t.x, t.y, tr);

      ctx.moveTo(ps.x, ps.y);
      ctx.lineTo(pt.x, pt.y);
  }

  ctx.stroke();

  ctx.fillStyle = "#4682b4";

  for (const v of nodes) {
      const p = transformPoint(v.x, v.y, tr);

      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fill();
  }

  // Set your text styles
  ctx.font = '16px sans-serif';
  ctx.fillStyle = 'black';
  ctx.textBaseline = 'top';

  // Loop and draw (assuming your nodes have x and y coordinates)
  nodes.forEach(node => {
      const p = transformPoint(node.x, node.y, tr);
      ctx.fillText(node.label, p.x, p.y);
  });

  drawBoundary(ctx, boundaryPoints, tr)

}

// ----------------- Animation control -----------------

function startAnimation() {
  stopAnimation();
  intervalId = setInterval(() => {
    step();
    draw();
  }, period);
}

function stopAnimation() {
  if (intervalId !== null) {
    clearInterval(intervalId);
    intervalId = null;
  }
}

// ----------------- UI -----------------

document.getElementById("runBtn").addEventListener("click", () => {
  const type = document.getElementById("graphType").value;
  const n = parseInt(type.match(/\d+/)[0]);

  stopAnimation();
  //createNodes(n);
  //createLinks(type);
  init_k_temp();
  console.log(nodes, links)
  draw();
});

document.getElementById("startBtn").addEventListener("click", startAnimation);
document.getElementById("stopBtn").addEventListener("click", stopAnimation);

document.getElementById("periodInput").addEventListener("change", (e) => {
  period = Math.max(1, parseInt(e.target.value));
  if (intervalId !== null) startAnimation();
});

// initial graph

//createLinks("path3");

//draw();
</script>

</body>
</html>
